<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo TEA — Demo Estática</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const CATEGORIAS = ["Educação", "Comunicação Alternativa (CAA)", "Habilidades Sociais", "Regulação Emocional", "Terapia e Saúde"];
    const IDADES = ["Crianças", "Adolescentes", "Adultos", "Pais/Terapeutas"];
    const ACESS = ["Baixo estímulo sensorial", "Pictogramas", "Personalização de cores/sons", "Compatível com leitura de tela"];

    const MOCK_APPS = [
      {
        id: "proloquo",
        nome: "Proloquo (exemplo)",
        descricao: "App de comunicação alternativa com vocabulário baseado em pictogramas.",
        categorias: ["Comunicação Alternativa (CAA)"],
        idades: ["Crianças", "Adolescentes", "Adultos"],
        acessibilidade: ["Pictogramas", "Personalização de cores/sons", "Compatível com leitura de tela"],
        plataformas: ["iOS"],
        preco: "Pago",
        finalidade: "Apoiar comunicação expressiva por pictogramas.",
        exemplosUso: ["Rotinas diárias (comer, beber, banheiro)", "Comunicar preferências em sala", "Quadros de escolha guiada"],
        rating: 4.6,
        votos: 214
      },
      {
        id: "alfabetiza",
        nome: "Alfabetiza Fácil",
        descricao: "Jogos estruturados para consciência fonológica e alfabetização com baixo estímulo sensorial.",
        categorias: ["Educação"],
        idades: ["Crianças"],
        acessibilidade: ["Baixo estímulo sensorial", "Personalização de cores/sons"],
        plataformas: ["Android", "Web"],
        preco: "Freemium",
        finalidade: "Apoiar alfabetização inicial com rotinas previsíveis.",
        exemplosUso: ["Sessões curtas (5-7 min) com reforço positivo", "Atividades sem tempo limite"],
        rating: 4.2,
        votos: 128
      }
    ];

    function classNames(...arr) { return arr.filter(Boolean).join(" "); }

    function Stars({ value, size = 18 }) {
      const stars = [0, 1, 2, 3, 4].map(i => value >= i + 1 ? "full" : value > i ? "half" : "empty");
      return (
        <div className="flex items-center gap-1" aria-label={"Avaliação: " + value.toFixed(1) + " de 5"}>
          <div className="flex gap-0.5" aria-hidden="true">
            {stars.map((s, i) => (
              <span key={i} className={s === "empty" ? "opacity-30" : ""} style={{ fontSize: size }}>
                {s === "half" ? "⭐︎" : "⭐"}
              </span>
            ))}
          </div>
          <span className="ml-1 text-sm font-medium">{value.toFixed(1)}</span>
        </div>
      );
    }

    const Pill = ({ children }) => (
      <span className="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium border border-slate-200 bg-white text-slate-600">
        {children}
      </span>
    );

    function App() {
      const [route, setRoute] = useState("home");
      const [prefs, setPrefs] = useState({ modoFoco: false, leituraSimples: false, altoContraste: false, reduzirAnimacoes: true });
      const [query, setQuery] = useState("");
      const [selCats, setSelCats] = useState([]);
      const [selIdades, setSelIdades] = useState([]);
      const [selAcess, setSelAcess] = useState([]);
      const [fav, setFav] = useState([]);
      const [currentId, setCurrentId] = useState(null);
      const [showPrefs, setShowPrefs] = useState(false);

      const filtered = useMemo(() => {
        return MOCK_APPS.filter(a =>
          (query ? (a.nome.toLowerCase().includes(query.toLowerCase()) || a.descricao.toLowerCase().includes(query.toLowerCase())) : true)
          && (selCats.length ? selCats.some(c => a.categorias.includes(c)) : true)
          && (selIdades.length ? selIdades.some(i => a.idades.includes(i)) : true)
          && (selAcess.length ? selAcess.every(ac => a.acessibilidade.includes(ac)) : true)
        );
      }, [query, selCats, selIdades, selAcess]);

      const current = useMemo(() => MOCK_APPS.find(a => a.id === currentId) || null, [currentId]);

      return (
        <div className={classNames("min-h-screen flex flex-col", prefs.altoContraste ? "bg-white text-black" : "bg-slate-50 text-slate-800")}>
          <header className="sticky top-0 z-40 bg-white border-b border-slate-200">
            <div className="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between">
              <div className="font-bold text-slate-900 cursor-pointer" onClick={() => setRoute('home')}>🛡️ Catálogo TEA</div>
              <nav className="flex items-center gap-4 text-sm font-medium">
                <button onClick={() => setRoute('home')} className={route === 'home' ? "text-slate-900" : "text-slate-500"}>Home</button>
                <button onClick={() => setRoute('buscar')} className={route === 'buscar' ? "text-slate-900" : "text-slate-500"}>Buscar</button>
              </nav>
            </div>
          </header>

          <main className="mx-auto w-full max-w-6xl p-4 md:p-6 flex-grow">
            {route === "home" && (
              <div className="py-12 text-center space-y-4">
                <h1 className="text-3xl font-bold text-slate-900">Catálogo de Aplicativos TEA</h1>
                <p className="text-slate-600 max-w-xl mx-auto">Protótipo funcional focado em critérios de acessibilidade e Engenharia de Usabilidade Inclusiva.</p>
                <button onClick={() => setRoute('buscar')} className="rounded-xl px-6 py-3 bg-slate-900 text-white font-medium hover:bg-slate-800">
                  Acessar Painel de Busca
                </button>
              </div>
            )}

            {route === "buscar" && (
              <div className="space-y-6">
                <div className="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                  <h2 className="font-bold text-lg text-slate-900 mb-3">Pesquisar</h2>
                  <input className="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-950/10"
                    placeholder="Ex: comunicação, pictogramas..." value={query} onChange={e => setQuery(e.target.value)} />
                </div>
                
                <div className="grid sm:grid-cols-2 gap-4">
                  {filtered.map(a => (
                    <div key={a.id} className="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
                      <h3 className="font-bold text-base text-slate-900">{a.nome}</h3>
                      <Stars value={a.rating} size={14} />
                      <p className="text-sm text-slate-600">{a.descricao}</p>
                      <div className="flex flex-wrap gap-1">
                        {a.categorias.map(c => <Pill key={c}>{c}</Pill>)}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          <footer className="border-t border-slate-200 bg-white p-4 text-center text-xs text-slate-400">
            © {new Date().getFullYear()} Catálogo TEA — Versão Estática Limpa
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
